Purpose: Main HTML template for the iKrypt application with SEO meta tags

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#312e81" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>iKrypt - Privacy Toolbox | Secure Encryption Tools</title>
    <meta name="title" content="iKrypt - Privacy Toolbox | Secure Encryption Tools">
    <meta name="description" content="10+ free, browser-based privacy tools. End-to-end encryption with zero server-side processing. Encrypt messages, files, and more without registration.">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ikrypt.com/">
    <meta property="og:title" content="iKrypt - Privacy Toolbox | Secure Encryption Tools">
    <meta property="og:description" content="10+ free, browser-based privacy tools. End-to-end encryption with zero server-side processing. Encrypt messages, files, and more without registration.">
    <meta property="og:image" content="https://ikrypt.com/og-image.png">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://ikrypt.com/">
    <meta property="twitter:title" content="iKrypt - Privacy Toolbox | Secure Encryption Tools">
    <meta property="twitter:description" content="10+ free, browser-based privacy tools. End-to-end encryption with zero server-side processing. Encrypt messages, files, and more without registration.">
    <meta property="twitter:image" content="https://ikrypt.com/twitter-image.png">
    
    <!-- Additional SEO Meta Tags -->
    <meta name="keywords" content="encryption tools, privacy, secure messaging, file encryption, end-to-end encryption, cryptography, password generator, zero-knowledge, secure notes, one-time secret">
    <meta name="author" content="iKrypt">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://ikrypt.com/">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
