<!-- /public/circuit-pattern.svg -->
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="circuit" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- Horizontal lines -->
      <path d="M10,25 H90 M10,75 H90" stroke="#ffffff" stroke-width="0.5" fill="none" />
      
      <!-- Vertical lines -->
      <path d="M25,10 V90 M75,10 V90" stroke="#ffffff" stroke-width="0.5" fill="none" />
      
      <!-- Connection dots -->
      <circle cx="25" cy="25" r="2" fill="#ffffff" opacity="0.5" />
      <circle cx="75" cy="25" r="2" fill="#ffffff" opacity="0.5" />
      <circle cx="25" cy="75" r="2" fill="#ffffff" opacity="0.5" />
      <circle cx="75" cy="75" r="2" fill="#ffffff" opacity="0.5" />
      
      <!-- Circuit elements -->
      <path d="M25,25 C35,25 35,50 25,50" stroke="#ffffff" stroke-width="0.5" fill="none" />
      <path d="M75,75 C65,75 65,50 75,50" stroke="#ffffff" stroke-width="0.5" fill="none" />
      <path d="M40,25 L60,25" stroke="#ffffff" stroke-width="0.5" fill="none" />
      <path d="M40,75 L60,75" stroke="#ffffff" stroke-width="0.5" fill="none" />
      
      <!-- Connection nodes -->
      <rect x="38" y="23" width="4" height="4" fill="#ffffff" opacity="0.3" />
      <rect x="58" y="23" width="4" height="4" fill="#ffffff" opacity="0.3" />
      <rect x="38" y="73" width="4" height="4" fill="#ffffff" opacity="0.3" />
      <rect x="58" y="73" width="4" height="4" fill="#ffffff" opacity="0.3" />
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#circuit)" />
</svg>