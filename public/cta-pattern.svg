<!-- /public/cta-pattern.svg -->
<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="diagonal-lines" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#ffffff" stroke-width="1" opacity="0.1" />
      <line x1="5" y1="0" x2="5" y2="10" stroke="#ffffff" stroke-width="0.5" opacity="0.1" />
    </pattern>
    
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" />
    </filter>
    
    <radialGradient id="glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
  </defs>
  
  <!-- Base pattern -->
  <rect width="100" height="100" fill="url(#diagonal-lines)" />
  
  <!-- Glow effects -->
  <circle cx="20" cy="20" r="15" fill="url(#glow)" filter="url(#blur)" />
  <circle cx="80" cy="80" r="20" fill="url(#glow)" filter="url(#blur)" />
  <circle cx="20" cy="80" r="10" fill="url(#glow)" filter="url(#blur)" />
  <circle cx="80" cy="20" r="12" fill="url(#glow)" filter="url(#blur)" />
</svg>