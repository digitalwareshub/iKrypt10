<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#27272a" stroke-width="0.5" opacity="0.4"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Email envelope with shield -->
  <g transform="translate(600, 250)">
    <!-- Outer glow -->
    <ellipse cx="0" cy="0" rx="160" ry="120" fill="#6366f1" opacity="0.1"/>

    <!-- Envelope body -->
    <rect x="-120" y="-60" width="240" height="140" rx="12" fill="#18181b" stroke="url(#primaryGradient)" stroke-width="3"/>

    <!-- Envelope flap -->
    <path d="M-120 -60 L0 40 L120 -60" fill="none" stroke="url(#primaryGradient)" stroke-width="3" stroke-linejoin="round"/>

    <!-- Lock icon in center -->
    <g transform="translate(0, 20)">
      <rect x="-20" y="-5" width="40" height="30" rx="5" fill="url(#primaryGradient)"/>
      <path d="M-12 -5 L-12 -18 C-12 -32 12 -32 12 -18 L12 -5" fill="none" stroke="url(#primaryGradient)" stroke-width="4"/>
      <circle cx="0" cy="10" r="5" fill="#0a0a0a"/>
    </g>

    <!-- Checkmark badge -->
    <g transform="translate(90, -40)">
      <circle cx="0" cy="0" r="25" fill="url(#greenGradient)"/>
      <path d="M-10 0 L-3 7 L12 -8" stroke="#fafafa" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Arrow showing transformation -->
  <g transform="translate(350, 280)">
    <!-- Bad email -->
    <rect x="-60" y="-30" width="120" height="60" rx="6" fill="#18181b" stroke="#ef4444" stroke-width="2" opacity="0.6"/>
    <text x="0" y="5" font-family="monospace" font-size="10" fill="#ef4444" text-anchor="middle">pass: 123</text>
    <line x1="-70" y1="0" x2="70" y2="0" stroke="#ef4444" stroke-width="2"/>
  </g>

  <g transform="translate(850, 280)">
    <!-- Good email with link -->
    <rect x="-60" y="-30" width="120" height="60" rx="6" fill="#18181b" stroke="#22c55e" stroke-width="2"/>
    <text x="0" y="-5" font-family="monospace" font-size="10" fill="#22c55e" text-anchor="middle">Link:</text>
    <text x="0" y="12" font-family="monospace" font-size="9" fill="#6366f1" text-anchor="middle">ikrypt.com/s/...</text>
  </g>

  <!-- Arrow -->
  <path d="M430 280 L530 280" stroke="#71717a" stroke-width="2" stroke-dasharray="5,5"/>
  <polygon points="540,280 525,272 525,288" fill="#71717a"/>

  <!-- Title -->
  <text x="600" y="470" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="700" fill="#fafafa" text-anchor="middle">Send Passwords via Email Securely</text>
  <text x="600" y="520" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#a1a1aa" text-anchor="middle">The Right Way to Share Credentials - 2026 Guide</text>

  <!-- Badge -->
  <g transform="translate(600, 80)">
    <rect x="-50" y="-20" width="100" height="40" rx="20" fill="#6366f1" opacity="0.2"/>
    <text x="0" y="7" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#6366f1" text-anchor="middle">GUIDE</text>
  </g>

  <!-- Corner accents -->
  <path d="M0 0 L80 0 L80 3 L3 3 L3 80 L0 80 Z" fill="#6366f1" opacity="0.4"/>
  <path d="M1200 630 L1120 630 L1120 627 L1197 627 L1197 550 L1200 550 Z" fill="#a855f7" opacity="0.4"/>
</svg>
