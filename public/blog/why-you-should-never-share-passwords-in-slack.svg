<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="slackPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#611f69"/>
      <stop offset="100%" style="stop-color:#4a154b"/>
    </linearGradient>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#27272a" stroke-width="0.5" opacity="0.4"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Slack-style hashtag with warning -->
  <g transform="translate(600, 260)">
    <!-- Outer glow -->
    <circle cx="0" cy="0" r="140" fill="#611f69" opacity="0.15"/>

    <!-- Chat bubble shape -->
    <rect x="-100" y="-80" width="200" height="140" rx="20" fill="#18181b" stroke="#611f69" stroke-width="3"/>
    <path d="M50 60 L70 90 L50 60" fill="#18181b" stroke="#611f69" stroke-width="3"/>

    <!-- Hashtag symbol -->
    <text x="-50" y="20" font-family="Inter, system-ui, sans-serif" font-size="80" font-weight="700" fill="#611f69">#</text>

    <!-- Password text being revealed -->
    <text x="30" y="10" font-family="monospace" font-size="24" fill="#71717a">***</text>

    <!-- Big X overlay -->
    <g transform="translate(0, 0)">
      <line x1="-80" y1="-60" x2="80" y2="60" stroke="url(#redGradient)" stroke-width="12" stroke-linecap="round"/>
      <line x1="80" y1="-60" x2="-80" y2="60" stroke="url(#redGradient)" stroke-width="12" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Search icon showing "password:" -->
  <g transform="translate(180, 200)">
    <circle cx="0" cy="0" r="25" fill="none" stroke="#71717a" stroke-width="3"/>
    <line x1="18" y1="18" x2="35" y2="35" stroke="#71717a" stroke-width="3" stroke-linecap="round"/>
    <text x="50" y="5" font-family="monospace" font-size="14" fill="#ef4444">"password:"</text>
  </g>

  <!-- Forever storage icon -->
  <g transform="translate(1020, 200)">
    <text x="0" y="10" font-family="Inter, system-ui, sans-serif" font-size="40" fill="#71717a" text-anchor="middle">&#8734;</text>
    <text x="0" y="40" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#71717a" text-anchor="middle">Stored forever</text>
  </g>

  <!-- Searchable icon -->
  <g transform="translate(180, 400)">
    <rect x="-30" y="-20" width="60" height="40" rx="6" fill="#18181b" stroke="#71717a" stroke-width="2"/>
    <text x="0" y="5" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#ef4444" text-anchor="middle">!</text>
    <text x="50" y="5" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#71717a">Searchable</text>
  </g>

  <!-- New members icon -->
  <g transform="translate(1020, 400)">
    <circle cx="-15" cy="0" r="15" fill="none" stroke="#71717a" stroke-width="2"/>
    <circle cx="15" cy="0" r="15" fill="none" stroke="#71717a" stroke-width="2"/>
    <circle cx="0" cy="0" r="15" fill="none" stroke="#ef4444" stroke-width="2"/>
    <text x="0" y="40" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#71717a" text-anchor="middle">All see history</text>
  </g>

  <!-- Title -->
  <text x="600" y="480" font-family="Inter, system-ui, sans-serif" font-size="40" font-weight="700" fill="#fafafa" text-anchor="middle">Why You Should NEVER Share</text>
  <text x="600" y="530" font-family="Inter, system-ui, sans-serif" font-size="40" font-weight="700" fill="#fafafa" text-anchor="middle">Passwords in Slack</text>
  <text x="600" y="575" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#a1a1aa" text-anchor="middle">Searchable Forever. Visible to Everyone. Security Nightmare.</text>

  <!-- Badge -->
  <g transform="translate(600, 70)">
    <rect x="-50" y="-18" width="100" height="36" rx="18" fill="#ef4444" opacity="0.2"/>
    <text x="0" y="6" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#ef4444" text-anchor="middle">WARNING</text>
  </g>

  <!-- Corner accents -->
  <path d="M0 0 L80 0 L80 3 L3 3 L3 80 L0 80 Z" fill="#611f69" opacity="0.4"/>
  <path d="M1200 630 L1120 630 L1120 627 L1197 627 L1197 550 L1200 550 Z" fill="#611f69" opacity="0.4"/>
</svg>
