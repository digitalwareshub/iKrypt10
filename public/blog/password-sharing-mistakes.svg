<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#27272a" stroke-width="0.5" opacity="0.4"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Number 7 with warning styling -->
  <g transform="translate(600, 260)">
    <!-- Outer glow -->
    <circle cx="0" cy="0" r="140" fill="#f97316" opacity="0.1"/>
    <circle cx="0" cy="0" r="100" fill="#f97316" opacity="0.15"/>

    <!-- Large 7 -->
    <text x="0" y="50" font-family="Inter, system-ui, sans-serif" font-size="200" font-weight="800" fill="url(#orangeGradient)" text-anchor="middle">7</text>
  </g>

  <!-- Mistake icons scattered around -->
  <!-- Sticky note -->
  <g transform="translate(180, 200)">
    <rect x="-25" y="-25" width="50" height="50" rx="4" fill="#fef08a" transform="rotate(-10)"/>
    <text x="0" y="5" font-family="monospace" font-size="10" fill="#78716c" text-anchor="middle" transform="rotate(-10)">pwd123</text>
    <line x1="-35" y1="-35" x2="35" y2="35" stroke="#ef4444" stroke-width="3"/>
  </g>

  <!-- Email icon -->
  <g transform="translate(1020, 200)">
    <rect x="-30" y="-20" width="60" height="40" rx="4" fill="#18181b" stroke="#71717a" stroke-width="2"/>
    <path d="M-30 -20 L0 5 L30 -20" fill="none" stroke="#71717a" stroke-width="2"/>
    <line x1="-40" y1="-30" x2="40" y2="30" stroke="#ef4444" stroke-width="3"/>
  </g>

  <!-- Chat bubble -->
  <g transform="translate(180, 400)">
    <rect x="-35" y="-20" width="70" height="40" rx="8" fill="#18181b" stroke="#71717a" stroke-width="2"/>
    <path d="M20 20 L30 35 L20 20" fill="#18181b" stroke="#71717a" stroke-width="2"/>
    <text x="0" y="5" font-family="monospace" font-size="10" fill="#71717a" text-anchor="middle">***</text>
    <line x1="-45" y1="-30" x2="45" y2="30" stroke="#ef4444" stroke-width="3"/>
  </g>

  <!-- Spreadsheet -->
  <g transform="translate(1020, 400)">
    <rect x="-35" y="-25" width="70" height="50" rx="4" fill="#18181b" stroke="#71717a" stroke-width="2"/>
    <line x1="-35" y1="-5" x2="35" y2="-5" stroke="#71717a" stroke-width="1"/>
    <line x1="-35" y1="15" x2="35" y2="15" stroke="#71717a" stroke-width="1"/>
    <line x1="-10" y1="-25" x2="-10" y2="25" stroke="#71717a" stroke-width="1"/>
    <line x1="-45" y1="-35" x2="45" y2="35" stroke="#ef4444" stroke-width="3"/>
  </g>

  <!-- Title -->
  <text x="600" y="480" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="700" fill="#fafafa" text-anchor="middle">Biggest Password Sharing Mistakes</text>
  <text x="600" y="530" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#a1a1aa" text-anchor="middle">And the Simple Fixes That Take the Same Time</text>

  <!-- Badge -->
  <g transform="translate(600, 80)">
    <rect x="-70" y="-20" width="140" height="40" rx="20" fill="#f97316" opacity="0.2"/>
    <text x="0" y="7" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#f97316" text-anchor="middle">80% OF BREACHES</text>
  </g>

  <!-- Corner accents -->
  <path d="M0 0 L80 0 L80 3 L3 3 L3 80 L0 80 Z" fill="#f97316" opacity="0.4"/>
  <path d="M1200 630 L1120 630 L1120 627 L1197 627 L1197 550 L1200 550 Z" fill="#f97316" opacity="0.4"/>
</svg>
