<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f1f2e"/>
      <stop offset="100%" style="stop-color:#18181b"/>
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Grid pattern overlay -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#27272a" stroke-width="0.5" opacity="0.4"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Header with logo -->
  <g transform="translate(50, 40) scale(0.15)">
    <path fill="url(#shieldGradient)" d="M466.5 83.7l-192-80a48.15 48.15 0 0 0-36.9 0l-192 80C27.7 91.1 16 108.6 16 128c0 198.5 114.5 335.7 221.5 380.3 11.8 4.9 25.1 4.9 36.9 0C360.1 472.6 496 349.3 496 128c0-19.4-11.7-36.9-29.5-44.3zM256.1 446.3l-.1-381 175.9 73.3c-3.3 151.4-82.1 261.1-175.8 307.7z"/>
  </g>
  <text x="140" y="100" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="700" fill="url(#textGradient)">iKrypt</text>

  <!-- Title -->
  <text x="600" y="100" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="700" fill="#fafafa" text-anchor="middle">Perfect For</text>

  <!-- Row 1 -->
  <!-- Card 1: Passwords -->
  <rect x="80" y="160" width="320" height="120" rx="16" fill="url(#cardGradient)" stroke="#27272a" stroke-width="1"/>
  <circle cx="130" cy="210" r="25" fill="url(#iconGradient)" opacity="0.2"/>
  <text x="130" y="218" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="url(#iconGradient)" text-anchor="middle">*</text>
  <text x="170" y="215" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="600" fill="#fafafa">Passwords</text>
  <text x="170" y="250" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#71717a">Share login credentials securely</text>

  <!-- Card 2: API Keys -->
  <rect x="440" y="160" width="320" height="120" rx="16" fill="url(#cardGradient)" stroke="#27272a" stroke-width="1"/>
  <circle cx="490" cy="210" r="25" fill="url(#iconGradient)" opacity="0.2"/>
  <text x="490" y="218" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="url(#iconGradient)" text-anchor="middle">{}</text>
  <text x="530" y="215" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="600" fill="#fafafa">API Keys</text>
  <text x="530" y="250" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#71717a">Send tokens to your team</text>

  <!-- Card 3: SSH Keys -->
  <rect x="800" y="160" width="320" height="120" rx="16" fill="url(#cardGradient)" stroke="#27272a" stroke-width="1"/>
  <circle cx="850" cy="210" r="25" fill="url(#iconGradient)" opacity="0.2"/>
  <text x="850" y="218" font-family="monospace" font-size="20" font-weight="700" fill="url(#iconGradient)" text-anchor="middle">~/.ssh</text>
  <text x="900" y="215" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="600" fill="#fafafa">SSH Keys</text>
  <text x="900" y="250" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#71717a">Private keys for servers</text>

  <!-- Row 2 -->
  <!-- Card 4: .env values -->
  <rect x="80" y="310" width="320" height="120" rx="16" fill="url(#cardGradient)" stroke="#27272a" stroke-width="1"/>
  <circle cx="130" cy="360" r="25" fill="url(#iconGradient)" opacity="0.2"/>
  <text x="130" y="368" font-family="monospace" font-size="16" font-weight="700" fill="url(#iconGradient)" text-anchor="middle">.env</text>
  <text x="170" y="365" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="600" fill="#fafafa">.env Values</text>
  <text x="170" y="400" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#71717a">Environment variables</text>

  <!-- Card 5: Bank Details -->
  <rect x="440" y="310" width="320" height="120" rx="16" fill="url(#cardGradient)" stroke="#27272a" stroke-width="1"/>
  <circle cx="490" cy="360" r="25" fill="url(#iconGradient)" opacity="0.2"/>
  <text x="490" y="368" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="url(#iconGradient)" text-anchor="middle">$</text>
  <text x="530" y="365" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="600" fill="#fafafa">Bank Details</text>
  <text x="530" y="400" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#71717a">Account numbers safely</text>

  <!-- Card 6: TLS/SSL Certs -->
  <rect x="800" y="310" width="320" height="120" rx="16" fill="url(#cardGradient)" stroke="#27272a" stroke-width="1"/>
  <circle cx="850" cy="360" r="25" fill="url(#iconGradient)" opacity="0.2"/>
  <text x="850" y="368" font-family="monospace" font-size="14" font-weight="700" fill="url(#iconGradient)" text-anchor="middle">.pem</text>
  <text x="900" y="365" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="600" fill="#fafafa">TLS/SSL Certs</text>
  <text x="900" y="400" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#71717a">Certificate text and PEM files</text>

  <!-- Row 3 - Centered -->
  <!-- Card 7: Anything Secret -->
  <rect x="440" y="460" width="320" height="120" rx="16" fill="url(#cardGradient)" stroke="#6366f1" stroke-width="2"/>
  <circle cx="490" cy="510" r="25" fill="url(#iconGradient)" opacity="0.3"/>
  <text x="490" y="518" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#fafafa" text-anchor="middle">?</text>
  <text x="530" y="515" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="600" fill="url(#textGradient)">Anything Secret</text>
  <text x="530" y="550" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#a1a1aa">If it's private, encrypt it</text>

  <!-- Corner accents -->
  <path d="M0 0 L80 0 L80 3 L3 3 L3 80 L0 80 Z" fill="#6366f1" opacity="0.4"/>
  <path d="M1200 630 L1120 630 L1120 627 L1197 627 L1197 550 L1200 550 Z" fill="#a855f7" opacity="0.4"/>
</svg>
