<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="15" flood-color="#6366f1" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Grid pattern overlay -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#27272a" stroke-width="0.5" opacity="0.4"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Header with logo -->
  <g transform="translate(50, 40) scale(0.15)">
    <path fill="url(#shieldGradient)" d="M466.5 83.7l-192-80a48.15 48.15 0 0 0-36.9 0l-192 80C27.7 91.1 16 108.6 16 128c0 198.5 114.5 335.7 221.5 380.3 11.8 4.9 25.1 4.9 36.9 0C360.1 472.6 496 349.3 496 128c0-19.4-11.7-36.9-29.5-44.3zM256.1 446.3l-.1-381 175.9 73.3c-3.3 151.4-82.1 261.1-175.8 307.7z"/>
  </g>
  <text x="140" y="100" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="700" fill="url(#textGradient)">iKrypt</text>

  <!-- Center lock/shield with glow -->
  <ellipse cx="600" cy="280" rx="150" ry="150" fill="#6366f1" opacity="0.15"/>
  <g transform="translate(510, 180) scale(0.35)">
    <path fill="url(#shieldGradient)" d="M466.5 83.7l-192-80a48.15 48.15 0 0 0-36.9 0l-192 80C27.7 91.1 16 108.6 16 128c0 198.5 114.5 335.7 221.5 380.3 11.8 4.9 25.1 4.9 36.9 0C360.1 472.6 496 349.3 496 128c0-19.4-11.7-36.9-29.5-44.3zM256.1 446.3l-.1-381 175.9 73.3c-3.3 151.4-82.1 261.1-175.8 307.7z"/>
  </g>

  <!-- Title -->
  <text x="600" y="440" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="700" fill="#fafafa" text-anchor="middle">Zero-Knowledge Encryption</text>

  <!-- Left feature -->
  <g transform="translate(100, 480)">
    <circle cx="30" cy="20" r="20" fill="#6366f1" opacity="0.2"/>
    <text x="30" y="26" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#22c55e" text-anchor="middle">&#10003;</text>
    <text x="65" y="28" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#a1a1aa">AES-256-GCM</text>
  </g>

  <!-- Center feature -->
  <g transform="translate(450, 480)">
    <circle cx="30" cy="20" r="20" fill="#6366f1" opacity="0.2"/>
    <text x="30" y="26" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#22c55e" text-anchor="middle">&#10003;</text>
    <text x="65" y="28" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#a1a1aa">Key stays in browser</text>
  </g>

  <!-- Right feature -->
  <g transform="translate(820, 480)">
    <circle cx="30" cy="20" r="20" fill="#6366f1" opacity="0.2"/>
    <text x="30" y="26" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#22c55e" text-anchor="middle">&#10003;</text>
    <text x="65" y="28" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#a1a1aa">We can't read your data</text>
  </g>

  <!-- Bottom tagline -->
  <text x="600" y="570" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#71717a" text-anchor="middle">Your secrets are encrypted before they leave your device.</text>

  <!-- Corner accents -->
  <path d="M0 0 L80 0 L80 3 L3 3 L3 80 L0 80 Z" fill="#6366f1" opacity="0.4"/>
  <path d="M1200 630 L1120 630 L1120 627 L1197 627 L1197 550 L1200 550 Z" fill="#a855f7" opacity="0.4"/>
</svg>
